short_bio: >-
  <p>
    I am a MEXT Scholar and final-year master's student in Information Systems Engineering 
    at The University of Osaka. My research focuses on 3D computer vision, generative modeling, 
    and geometric deep learning, with an emphasis on point cloud processing and mesh generation.
  </p>
  <p>
    I am currently working on <strong>OptimusMesh</strong>, an autoregressive framework for 
    generating compact and high-quality triangle meshes from point clouds using sparse latent pivots 
    and transformer-based decoding. I aim to pursue a Ph.D. in computer science with a focus on 
    3D vision, generative AI, and 3D scene understanding.
  </p>

