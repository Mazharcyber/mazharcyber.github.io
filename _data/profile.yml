  <p>
    I am a MEXT Scholar and final-year master's student at The University of Osaka,
    specializing in 3D computer vision, generative AI, and geometric deep learning.
    My research focuses on 3D data understanding, point cloud processing, 3D scene
    understanding, and structured 3D representation learning.
  </p>
  <p>
    I am interested in developing learning-based methods for understanding and generating
    complex 3D structures, with applications in computer vision, robotics, and intelligent systems.
  </p>

